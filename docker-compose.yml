services:
  api:
    build: .
    container_name: rag-smart-qa-api
    env_file:
      - .env
    environment:
      RAG_ENV: prod
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./prompts:/app/prompts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
