services:
  api:
    build: .
    container_name: rag-smart-qa-api
    env_file:
      - .env
    environment:
      RAG_ENV: prod
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./configs:/app/configs
      - ./prompts:/app/prompts
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=5)"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    env_file:
      - ./web/.env.example
    container_name: rag-smart-qa-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((r) => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 20s
