name: ci

on:
  push:
  pull_request:

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install -e .
      - name: Lint
        run: |
          ruff check src tests evaluation/resume_metrics.py
      - name: Typecheck
        run: |
          mypy src tests evaluation/resume_metrics.py

  backend-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Install
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          pip install -e .
      - name: Test
        env:
          RAG_SKIP_STARTUP_VALIDATION: "1"
          OPENAI_API_KEY: test
          OPENAI_BASE_URL: http://localhost:9999/v1
          OPENAI_ORG: ""
        run: |
          pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=60 -q
      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-${{ matrix.python-version }}
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: rag-smart-qa-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
