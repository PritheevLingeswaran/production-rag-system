app:
  environment: dev

api:
  reload: true

# Dev-friendly defaults:
# - Use local embeddings to avoid embedding API cost.
# - Enable hybrid retrieval (BM25 + dense).
embeddings:
  provider: sentence_transformers
  model: all-MiniLM-L6-v2
  batch_size: 32

retrieval:
  min_score: 0.30
  refuse_if_top_score_below: 0.45
  refuse_if_top_gap_below: 0.05
  hybrid:
    enabled: true
    dense_weight: 0.65
    dense_k: 50
    bm25_k: 250
  rerank:
    enabled: true
    model_name: cross-encoder/ms-marco-MiniLM-L-6-v2
